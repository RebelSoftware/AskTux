<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a3a4a"/>
      <stop offset="100%" stop-color="#0d2137"/>
    </linearGradient>
    <linearGradient id="bubble" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8f4f8"/>
      <stop offset="100%" stop-color="#d0eaf2"/>
    </linearGradient>
  </defs>

  <!-- Rounded-square background -->
  <rect width="128" height="128" rx="28" fill="url(#bg)"/>

  <!-- Speech bubble -->
  <path d="M18 52 Q18 28 38 28 L90 28 Q110 28 110 52 L110 78 Q110 102 90 102 L58 102 L40 118 L44 102 L38 102 Q18 102 18 78 Z"
        fill="url(#bubble)" stroke="#b0d4e0" stroke-width="1.5"/>

  <!-- Penguin face inside bubble -->
  <!-- Head -->
  <ellipse cx="64" cy="56" rx="22" ry="20" fill="#1a1a2e"/>

  <!-- White face patch -->
  <ellipse cx="64" cy="62" rx="16" ry="13" fill="#f0f0f0"/>

  <!-- Eyes -->
  <circle cx="55" cy="52" r="4.5" fill="#1a1a2e"/>
  <circle cx="73" cy="52" r="4.5" fill="#1a1a2e"/>
  <circle cx="55" cy="52" r="1.8" fill="#ffffff"/>
  <circle cx="73" cy="52" r="1.8" fill="#ffffff"/>

  <!-- Beak -->
  <path d="M60 61 L68 61 L64 69 Z" fill="#f5a623"/>

  <!-- Question mark -->
  <text x="92" y="54" font-family="'Segoe UI', Arial, sans-serif"
        font-size="32" font-weight="bold" fill="#1a3a4a" text-anchor="middle">?</text>

  <!-- Small terminal prompt at bottom -->
  <text x="46" y="90" font-family="'Courier New', monospace" font-size="11"
        fill="#2d7a4e" font-weight="bold">$ _</text>
</svg>
